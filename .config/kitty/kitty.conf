# BEGIN_KITTY_FONTS
font_family      BigBlueTermPlus Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0
# END_KITTY_FONTS

shell zsh

scrollback_lines 10000
repaint_delay 8
input_delay 2
sync_to_monitor yes
confirm_os_window_close 0

include bingus-theme.conf
symbol_map U+23FB-U+23FE,U+2b58,U+e000-U+e00a,U+e0a0-U+e0a3,U+e0b0-U+e0c8,U+e0ca,U+e0cc-U+e0d4,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b1,U+e700-U+e7c5,U+f000-U+f2e0,U+f300-U+f372,U+f400-U+f532,U+f0001-U+f1af0 Noto Color Emoji

# Keybindings for Copy, Paste, Cut
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard
map ctrl+x cut_to_clipboard

# Reassign SIGINT (Interrupt) to Ctrl+Alt+C
map ctrl+alt+c send_text all \x03
