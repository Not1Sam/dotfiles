#Vitals:
#
$mainMod = SUPER #Window Key Bind
$terminal = kitty # Terminal
$browser = flatpak run app.zen_browser.zen #browser
$fileManager = thunar #File Manager
$menu = rofi -show drun #App Nav
$network = networkmanager_dmenu
$ssDir = /home/bingus/Pictures/
#
#----------------------------------------------------------------------------------------------------->
#Log Out once lid is closed
#
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/suspend.sh
#
#---------------------------------------------------------------------------------------------------------------
#
#Basic Window Controls
#
bind = $mainMod , Q , exec , $terminal #Open Terminal
bind = $mainMod , D , killactive #Kill Active Window
bind = $mainMod SHIFT, D, forcekillactive #Force Kill Active Window 
bind = $mainMod , E , exec , $fileManager # Open File Manager
bind = ALT , SPACE , exec ,$menu #Use App Manager
bind = $mainMod, B, exec ,$browser #Browser
bind = $mainMod , V , togglefloating, #Toggle Floating On Active Window
bind = $mainMod , F , fullscreen, # Toggle FullScreen On Active Window
bind = $mainMod , J , togglesplit, #Dwindle
bind = $mainMod ALT, P  , pseudo, #Dwindle
bind = $mainMod , G , togglegroup,#Toggle Group
bind = $mainMod SHIFT , B , exec , ~/.config/waybar/scripts/launch.sh #Reload Waybar
bind = $mainMod , L , exec, hyprlock, # Lock
bind = $mainMod , N , exec, $network # Network Manager
bind = CONTROL SHIFT, Escape, exec, $terminal -e btop #Task Mabnager
bind = $mainMod , M , exec , swaync-client -t -sw # sway Menu
bind = $mainMod , X , exec , ~/.config/hypr/scripts/screenctl #Display Manager
# Key: SUPER + Print Screen (e.g., Windows Key + SHIFT + S)
bind = $mainMod SHIFT,S, exec, grim -g "$(slurp)" - | tee $ssDir/$(date +%Y-%m-%d_%H-%M-%S_area.png) | wl-copy

# Key: SUPER + SHIFT + Print Screen
bind = $mainMod SHIFT, Print, exec, grim -g "$(hyprctl activewindow | grep 'at:' | cut -d: -f2 | tr -d '[:space:]') $(hyprctl activewindow | grep 'size:' | cut -d: -f2 | tr -d '[:space:]' | sed 's/,/x/g')" - | tee $ssDir/$(date +%Y-%m-%d_%H-%M-%S_window.png) | wl-copy

bind = $mainMod , P, exec, hyprpicker -a | wl-copy #color picker

#---------------------------------------------------------------------------------------------------------------
#
# Workspace Focus Controll 
#
bind = $mainMod, left, movefocus, l # Move Focus Left
bind = $mainMod, right, movefocus, r # Move Focus Right
bind = $mainMod, up, movefocus, u # Move Focus Up
bind = $mainMod, down, movefocus, d # Move Focus Down
# 
# Workspace Switching
#
bind = $mainMod, 1, workspace, 1 
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
#
# Workspace Window Movement
#
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 4
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
#
# Move/resize windows with mainMod + LMB/RMB and dragging
#
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
#
#----------------------------------------------------------------------------------------------------->
#
# Laptop multimedia keys for volume and LCD brightness
#
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, bash -c 'cur=$(brightnessctl get); min=$(brightnessctl m); perc=$((cur*100/min)); if [ $perc -gt 5 ]; then brightnessctl set 5%-; else brightnessctl set 5%; fi'
#
#----------------------------------------------------------------------------------------------------->
#
# Hand Gestures (New 0.51+ syntax)
#
gesture = 3, horizontal, workspace                     # Swipe 3 fingers horizontally to switch workspaces
gesture = 3, down, dispatcher, killactive              # Swipe 4 fingers down to close active window
gesture = 3, up, dispatcher, fullscreen                # Swipe 4 fingers up to toggle fullscreen
gesture = 4, down, dispatcher, exec, hyprlock          # Swipe 3 fingers up to toggle special workspace
#
#----------------------------------------------------------------------------------------------------->
