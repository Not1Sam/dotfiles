general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    # Wallpaper Matched: Dynamic colors
    col.active_border = $color5 $color2 45deg
    col.inactive_border = $color0

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.85

    # Correct Shadow syntax for recent Hyprland versions
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 5
        passes = 1
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

animations {
    enabled = true

    # MacBook-style Fluid Curves
    bezier = fluent, 0.42, 0, 0.58, 1
    bezier = easeInOut, 0.65, 0, 0.35, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    # Window animations
    animation = windows, 1, 3, easeInOut, popin 80%
    animation = windowsIn, 1, 3, easeInOut, popin 80%
    animation = windowsOut, 1, 3, easeInOut, popin 80%
    animation = windowsMove, 1, 3, fluent, slide
    
    # Border and Fade
    animation = border, 1, 2, default
    animation = fade, 1, 3, default
    
    # Fluid Workspace transitions
    animation = workspaces, 1, 4, easeInOut, slide
    
    # Layer animations (Waybar, SwayNC)
    animation = layers, 1, 2, fluent, fade
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}
