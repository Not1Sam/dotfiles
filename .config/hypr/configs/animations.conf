general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    # Wallpaper Matched: Gold and Teal
    col.active_border = rgba(B0AC76ee) rgba(4291A6ee) 45deg
    col.inactive_border = rgba(4B574Eaa)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.85

    # Correct Shadow syntax for recent Hyprland versions
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 5
        passes = 3
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

animations {
    enabled = true

    # Japan Cyber-Hacker / Snappy Bezier
    bezier = overshot, 0.05, 0.9, 0.1, 1.15
    bezier = snappy, 0.3, 0, 0, 1
    bezier = bounce, 0.175, 0.885, 0.32, 1.275

    # Windows pop from 10% to give a "grow" effect when created
    animation = windows, 1, 3, bounce, popin 10%
    animation = windowsIn, 1, 3, bounce, popin 10%
    animation = windowsOut, 1, 3, bounce, popin 10%
    animation = windowsMove, 1, 3, snappy, slide
    animation = border, 1, 1, default
    animation = fade, 1, 3, default
    
    # "Shrink and Grow" Workspace Animation (Slide Horizontal)
    # Re-tuned for compatibility and snappiness
    animation = workspaces, 1, 4, overshot, slidefade 20%
    
    # Enable animations for layers (Waybar, SwayNC)
    animation = layers, 1, 3, default, slide top
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}
