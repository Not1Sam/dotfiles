general {
    # This tells hypridle: "If the system asks to lock, use hyprlock"
    lock_cmd = pidof hyprlock || hyprlock
    
    # IMPORTANT: Lock the screen BEFORE the system goes to sleep
    before_sleep_cmd = loginctl lock-session
    
    # Turn the screen back on immediately when you wake up
    after_sleep_cmd = hyprctl dispatch dpms on
}

# --- Stage 1: Dim Screen (2 min) ---
listener {
    timeout = 120
    on-timeout = brightnessctl -s set 10%         # Save current brightness and dim to 10%
    on-resume = brightnessctl -r                  # Restore previous brightness
}

# --- Stage 2: Lock Screen (4 min) ---
listener {
    timeout = 240
    on-timeout = loginctl lock-session            # Trigger the lock_cmd defined above
}

# --- Stage 3: Turn Off Display (5 min) ---
listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off        # Turn off the actual monitor signal
    on-resume = hyprctl dispatch dpms on          # Turn it back on when you touch the mouse
}

# --- Stage 4: Deep Sleep (10 min) ---
listener {
    timeout = 600
    on-timeout = systemctl suspend                # Go to sleep
}
