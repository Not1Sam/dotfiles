# --- General Settings ---
general {
    hide_cursor = true
    ignore_empty_input = true
    pam_module = hyprlock 
}

# --- Authentication (Fingerprint) ---
auth {
    fingerprint:enabled = true
    fingerprint:ready_message = (Scan fingerprint to unlock)
    fingerprint:present_message = Scanning...
}

# --- Background ---
background {
    monitor = 
    path = screenshot 
    color = rgba(15, 15, 15, 0.9) 
    blur_passes = 4 # Increased for smoother look
    blur_size = 7
}

# --- Time Label ---
label {
    monitor = 
    text = $TIME
    color = rgba(51, 204, 255, 1.0) # Neon Cyan
    font_size = 80 # Larger for impact
    font_family = BigBlueTermPlus Nerd Font Mono
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 3
}

# --- Date Label ---
label {
    monitor = 
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(0, 255, 153, 1.0) # Neon Green
    font_size = 24
    font_family = BigBlueTermPlus Nerd Font Mono
    position = 0, 80
    halign = center
    valign = center
}

# --- User Label ---
label {
    monitor = 
    text = Sup $USER You Bitch!!
    color = rgba(254, 254, 254, 0.8)
    font_size = 18
    font_family = BigBlueTermPlus Nerd Font Mono
    position = 0, -50
    halign = center
    valign = center
}

# --- Input Field ---
input-field {
    monitor = 
    size = 350, 60
    outline_thickness = 4
    dots_size = 0.25 
    dots_spacing = 0.3 
    dots_center = true
    
    outer_color = rgba(51, 204, 255, 0.6) rgba(0, 255, 153, 0.6) 45deg
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(254, 254, 254, 1.0)
    font_family = BigBlueTermPlus Nerd Font Mono
    
    fade_on_empty = false
    placeholder_text = <i>Scan Finger or Type...</i> 
    
    check_color = rgba(0, 255, 153, 0.8)
    fail_color = rgba(255, 50, 50, 0.8)
    
    position = 0, -140
    halign = center
    valign = center
    rounding = 20
}
