source = ~/.cache/wal/colors-hyprlock.conf

# --- General Settings ---
general {
    hide_cursor = true
    ignore_empty_input = true
}

# --- Parallel Authentication ---
auth {
    fingerprint {
        enabled = true
        ready_message = (Scan Fingerprint to Unlock)
        present_message = Scanning fingerprint...
    }
}

# --- Background ---
background {
    monitor = 
    path = /home/bingus/Downloads/wallpaper.jpeg
    color = $background
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- Time Label ---
label {
    monitor = 
    text = $TIME
    color = $color3
    font_size = 90
    font_family = BigBlueTermPlus Nerd Font Mono
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
}

# --- Date Label ---
label {
    monitor = 
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = $color5
    font_size = 24
    font_family = BigBlueTermPlus Nerd Font Mono
    position = 0, 80
    halign = center
    valign = center
}

# --- User Label ---
label {
    monitor = 
    text = Sup $USER You Bitch!!
    color = $foreground
    font_size = 18
    font_family = BigBlueTermPlus Nerd Font Mono
    position = 0, -50
    halign = center
    valign = center
}

# --- Input Field ---
input-field {
    monitor = 
    size = 350, 60
    outline_thickness = 4
    dots_size = 0.25 
    dots_spacing = 0.3 
    dots_center = true
    
    outer_color = $color3 $color5 45deg
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = $foreground
    font_family = BigBlueTermPlus Nerd Font Mono
    
    fade_on_empty = true
    # Using the variable inside the placeholder for a cleaner look
    placeholder_text = <i>$FPRINTMESSAGE</i> 
    
    check_color = $color3
    fail_color = $color1
    
    position = 0, -140
    halign = center
    valign = center
    rounding = 16
}
